<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#070A12"/>
      <stop offset="1" stop-color="#0A0F1C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .kicker{font:600 28px/1.1 system-ui,-apple-system,Segoe UI,Inter,Arial;letter-spacing:.06em;fill:#A7B0C0;}
      .title{font:750 72px/1.05 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#F6F7FB;}
      .sub{font:500 30px/1.25 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#C9D1E0;}
      .chip{font:600 24px/1 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#E8ECF6;}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- subtle starburst -->
  <g opacity="0.16" transform="translate(220 470)">
    <g fill="#F59E0B">
      <path d="M-8-180h16v90h-16z"/>
      <path d="M-8 90h16v90h-16z"/>
      <path d="M-180-8h90v16h-90z"/>
      <path d="M 90-8h90v16h-90z"/>
      <path d="M-7-128l14-8 45 78-14 8z"/>
      <path d="M-7 128l14 8 45-78-14-8z"/>
      <path d="M-128-7l8-14 78 45-8 14z"/>
      <path d="M 128-7l-8-14-78 45 8 14z"/>
    </g>
  </g>

  <!-- target rings -->
  <g transform="translate(1160 410)">
    <circle r="190" fill="#0B1220" opacity="0.55" filter="url(#soft)"/>
    <circle r="220" fill="none" stroke="#93C5FD" stroke-opacity="0.18" stroke-width="2"/>
    <circle r="160" fill="none" stroke="#A7F3D0" stroke-opacity="0.18" stroke-width="2"/>
    <circle r="105" fill="none" stroke="#93C5FD" stroke-opacity="0.22" stroke-width="2"/>
    <circle r="56" fill="none" stroke="#A7F3D0" stroke-opacity="0.25" stroke-width="2"/>
    <circle r="10" fill="#E5E7EB" opacity="0.9"/>
    <path d="M-12 0h24" stroke="#E5E7EB" stroke-width="3" opacity="0.65"/>
    <path d="M0 -12v24" stroke="#E5E7EB" stroke-width="3" opacity="0.65"/>
  </g>

  <!-- chips -->
  <g transform="translate(96 86)">
    <rect x="0" y="0" rx="18" ry="18" width="170" height="46" fill="#10182B" opacity="0.9"/>
    <text x="22" y="31" class="chip">ЗАКРЫТИЕ</text>
    <rect x="184" y="0" rx="18" ry="18" width="190" height="46" fill="#10182B" opacity="0.75"/>
    <text x="206" y="31" class="chip">6 МИН ЧТЕНИЯ</text>
  </g>

  <!-- text -->
  <g transform="translate(96 220)">
    <text class="kicker" x="0" y="0">GOLDEN KEY OF SALES</text>
    <text class="title" x="0" y="96">Закрытие без давления</text>
    <text class="title" x="0" y="176">3 типа вопросов, которые работают</text>

    <rect x="0" y="218" width="520" height="6" rx="3" fill="url(#accent)" opacity="0.9"/>

    <text class="sub" x="0" y="286">Ready-questions • Choice-questions • Closing phrase</text>
    <text class="sub" x="0" y="330" opacity="0.92">Чтобы клиент сам сказал: «давай начнём»</text>
  </g>
</svg>
