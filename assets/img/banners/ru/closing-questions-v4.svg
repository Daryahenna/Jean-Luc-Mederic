<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060E"/>
      <stop offset="0.5" stop-color="#0B1326"/>
      <stop offset="1" stop-color="#05060E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.6" r="0.9">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.12"/>
      <stop offset="0.45" stop-color="#60A5FA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .chip{font:600 24px/1 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#E8ECF6;}
      .title{font:820 86px/1.02 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#F6F7FB;}
      .sub{font:520 30px/1.25 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#C9D1E0;}
      .tag{font:650 22px/1 system-ui,-apple-system,Segoe UI,Inter,Arial;fill:#E8ECF6;opacity:.92;}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- chips -->
  <g transform="translate(96 86)">
    <rect x="0" y="0" rx="18" ry="18" width="170" height="46" fill="#10182B" opacity="0.9"/>
    <text x="22" y="31" class="chip">ЗАКРЫТИЕ</text>
    <rect x="184" y="0" rx="18" ry="18" width="240" height="46" fill="#10182B" opacity="0.75"/>
    <text x="206" y="31" class="chip">3 вопроса</text>
  </g>

  <!-- diagonal accent -->
  <path d="M-100 820L680 -40" stroke="url(#accent)" stroke-width="14" opacity="0.35"/>
  <path d="M80 920L860 0" stroke="url(#accent)" stroke-width="6" opacity="0.25"/>

  <!-- cards on right -->
  <g transform="translate(990 210)">
    <rect x="0" y="0" width="520" height="520" rx="42" fill="#0B1220" opacity="0.60"/>
    <g transform="translate(46 54)">
      <rect x="0" y="0" width="428" height="112" rx="26" fill="#10182B" opacity="0.85"/>
      <rect x="0" y="138" width="428" height="112" rx="26" fill="#10182B" opacity="0.70"/>
      <rect x="0" y="276" width="428" height="112" rx="26" fill="#10182B" opacity="0.58"/>
      <rect x="0" y="414" width="428" height="18" rx="9" fill="#10182B" opacity="0.38"/>

      <text x="30" y="72" class="tag">Ready-question</text>
      <text x="30" y="210" class="tag">Choice-question</text>
      <text x="30" y="348" class="tag">Closing phrase</text>

      <circle cx="388" cy="60" r="10" fill="#22C55E" opacity="0.95"/>
      <circle cx="388" cy="198" r="10" fill="#60A5FA" opacity="0.95"/>
      <circle cx="388" cy="336" r="10" fill="#F59E0B" opacity="0.95"/>
    </g>
    <circle cx="120" cy="420" r="140" fill="#60A5FA" opacity="0.10" filter="url(#shadow)"/>
    <circle cx="420" cy="420" r="160" fill="#22C55E" opacity="0.08" filter="url(#shadow)"/>
  </g>

  <!-- main text -->
  <g transform="translate(96 280)">
    <text class="title" x="0" y="0">Закрывай</text>
    <text class="title" x="0" y="92">без дожима</text>
    <rect x="0" y="126" width="560" height="8" rx="4" fill="url(#accent)" opacity="0.9"/>
    <text class="sub" x="0" y="206">Готовность → выбор → шаг</text>
    <text class="sub" x="0" y="250" opacity="0.92">Без слова «контракт» и без неловкости</text>
  </g>
</svg>
